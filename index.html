@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Archivo:wght@400;600;800;900&family=Fira+Mono:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --ink: #111111;
  --ink-70: #3a3a3a;
  --ink-50: #6b6b6b;
  --ink-30: #a8a8a8;
  --ink-10: #f0f0f0;
  --hair: #e4e4e4;
  --surface: #f6f6f6;
  --bg: #f2f2f4;
  --brand: #111111;
  --danger: #b91c1c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body, #root {
  height: 100%;
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--ink);
  background: #fff;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

button { font-family: inherit; }
input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }

/* ============ APP SHELL ============ */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  height: 56px;
  border-bottom: 1px solid var(--hair);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  background: #fff;
  gap: 16px;
}
.topbar-title {
  font-size: 13px; font-weight: 500; letter-spacing: -0.1px;
  color: var(--ink-70);
  display: flex; align-items: center; gap: 10px;
  min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar-title .brand {
  color: var(--ink); font-weight: 700; letter-spacing: -0.4px; font-size: 14px;
}
.topbar-title .sep { width: 1px; height: 16px; background: var(--hair); flex-shrink: 0; }
.topbar-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

.theme-switch {
  display: inline-flex; border: 1px solid var(--hair); border-radius: 6px;
  overflow: hidden; height: 32px;
}
.theme-switch button {
  background: #fff; border: none; padding: 0 12px; font-size: 12px; font-weight: 500;
  color: var(--ink-50); cursor: pointer; border-right: 1px solid var(--hair);
  transition: all 0.12s ease; line-height: 1;
  font-family: 'Inter', sans-serif;
}
.theme-switch button:last-child { border-right: none; }
.theme-switch button:hover { background: var(--ink-10); color: var(--ink); }
.theme-switch button.active { background: var(--ink); color: #fff; }

.btn {
  font-size: 13px; font-weight: 500; padding: 8px 14px;
  border-radius: 6px; border: 1px solid transparent;
  cursor: pointer; transition: all 0.15s ease; line-height: 1;
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
}
.btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

/* ============ MAIN LAYOUT ============ */
.main {
